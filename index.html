<style>
:root{
  --bg:#1B1410; --bg2:#241A13; --bg3:#2C2018; --ink:#F6ECE4; --mut:#C9B4A6;
  --line:#3A2C22; --accent:#E8833C; --accent2:#F3A868; --accentInk:#2A1408;
  --serif:Georgia,'Times New Roman',serif; --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
}
:root[data-theme="light"]{
  --bg:#FBF4EE; --bg2:#FFFFFF; --bg3:#FCF6F1; --ink:#241A13; --mut:#7A6656;
  --line:#EAD9CB; --accent:#C96A25; --accent2:#E8833C; --accentInk:#FFFFFF;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit}

/* ── topbar: знак + словомарка слева, две круглые кнопки справа (стандарт линейки) ── */
.topbar{position:fixed;top:0;left:0;right:0;z-index:7;display:flex;justify-content:space-between;align-items:center;padding:12px 16px}
.brand{display:flex;align-items:center;gap:9px;text-decoration:none;color:var(--ink)}
.brandmark{width:26px;height:26px;flex:none}
.brandmark svg{width:100%;height:100%;display:block}
.wm{font-family:var(--sans);font-weight:700;font-size:19px;letter-spacing:.2px}
@keyframes markIn{0%{transform:translate(calc(50vw - 29px),calc(42vh - 26px)) scale(8);opacity:0}
  18%{opacity:1}64%{transform:translate(calc(50vw - 29px),calc(42vh - 26px)) scale(8)}
  100%{transform:translate(0,0) scale(1)}}
.brandmark.reveal{animation:markIn 2.4s cubic-bezier(.65,0,.25,1) both}
.topctrl{display:flex;align-items:center;gap:8px}
.rbtn{width:40px;height:40px;min-width:40px;border-radius:50%;border:1px solid var(--line);background:var(--bg2);
  color:var(--ink);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.rbtn:hover{border-color:var(--accent)}
.rbtn:active{transform:scale(.92)}
.langwrap{position:relative}
.langmenu{position:absolute;top:46px;right:0;background:var(--bg2);border:1px solid var(--line);border-radius:14px;
  padding:6px;min-width:176px;box-shadow:0 12px 30px rgba(0,0,0,.28);display:none;z-index:40}
.langmenu.open{display:block}
.langmenu button{display:flex;width:100%;gap:10px;align-items:center;background:none;border:none;color:var(--ink);
  padding:9px 10px;border-radius:9px;cursor:pointer;font-size:14px;text-align:left;font-family:inherit}
.langmenu button:hover{background:var(--bg3)}
.langmenu button .code{font-weight:700;color:var(--accent);width:26px}
.langmenu button[aria-current="true"]{background:var(--bg3)}

section{padding:0 22px}
.wrap{max-width:720px;margin:0 auto}

/* hero */
.hero{min-height:100svh;display:flex;flex-direction:column;justify-content:center;padding-top:82px;padding-bottom:40px}
.tag{color:var(--accent);font-size:13px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-bottom:14px}
h1{font-family:var(--sans);font-size:clamp(52px,15vw,96px);line-height:.98;font-weight:700;letter-spacing:-.01em}
.sub{font-size:clamp(19px,4.8vw,26px);color:var(--accent2);margin-top:10px;font-weight:600}
.hook{font-size:clamp(16px,3.6vw,19px);color:var(--mut);margin-top:20px;max-width:580px}

/* photo-wow card */
.wow{margin-top:30px;background:var(--bg2);border:1px solid var(--line);border-radius:20px;padding:18px;max-width:440px}
.wow .wh{display:flex;align-items:center;gap:8px;color:var(--mut);font-size:13px;margin-bottom:14px}
.wow .wh b{color:var(--ink)}
.fox{width:18px;height:18px}
.pline{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;border-radius:12px;background:var(--bg3);margin-bottom:9px;font-size:14px;
  opacity:0;transform:translateY(8px);transition:opacity .45s ease,transform .45s ease}
.pline.show{opacity:1;transform:none}
.pline .ic{flex:0 0 auto;font-size:15px;line-height:1.4}
.pline .tx{flex:1}
.pline.get{color:var(--ink)}
.pline.get .lbl{color:var(--accent);font-weight:700}
.pline.done{align-items:center;justify-content:space-between}
.pline.done .tx{color:var(--mut)}
.ynb{display:flex;gap:6px;flex:0 0 auto}
.yn{width:30px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;border:1px solid var(--line)}
.yn.y{border-color:var(--accent);background:var(--accent);color:var(--accentInk)}

/* cta */
.cta{display:flex;flex-wrap:wrap;gap:12px;margin-top:30px;align-items:center}
.btn{display:inline-flex;align-items:center;gap:9px;background:var(--accent);color:var(--accentInk);
  font-weight:700;font-size:16px;padding:15px 26px;border-radius:14px;text-decoration:none;border:none;cursor:pointer;font-family:inherit}
.btn:hover{background:var(--accent2)}
.btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
.btn.ghost:hover{border-color:var(--accent)}
.ctanote{font-size:13px;color:var(--mut);margin-top:12px}

/* blocks */
.block{padding:64px 22px}
.block h2{font-family:var(--sans);font-size:clamp(26px,6vw,34px);margin-bottom:26px}
.step{display:flex;gap:16px;padding:16px 0;border-top:1px solid var(--line)}
.step .n{font-family:var(--sans);font-size:22px;color:var(--accent);font-weight:700;flex:0 0 34px}
.step p{font-size:16px;margin-top:2px}
.proofs{list-style:none;display:grid;gap:12px}
.proofs li{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:16px 18px;font-size:15px;position:relative;padding-left:44px}
.proofs li::before{content:"";position:absolute;left:18px;top:19px;width:12px;height:12px;border-radius:50%;
  background:var(--accent);box-shadow:0 0 0 4px color-mix(in srgb,var(--accent) 22%,transparent)}

/* footer */
footer{text-align:center;padding:40px 22px 64px;font-size:15px;color:var(--mut);border-top:1px solid var(--line)}
footer a{display:inline-block;padding:8px 4px;text-decoration:underline;text-decoration-color:var(--accent);text-underline-offset:4px}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--bg);
  padding:12px 20px;border-radius:12px;font-size:14px;font-weight:600;opacity:0;pointer-events:none;transition:.3s;z-index:9}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(prefers-reduced-motion:reduce){
  .brandmark.reveal{animation:none}.pline{transition:none;opacity:1;transform:none}
}
</style>
</head>

<script>
const L = {

    hook:"Email, calendar, bank, notes — Lis connects once and sorts the flow by itself. From you: just “Yes” or “No”. And if you want to remember something — just drop a photo, he handles the rest.",
    wowHead:"Lis online", exLbl:"Got it:",
    ex:[
      {photo:"photo of a handwritten note", get:"invoice for the tenant, due tomorrow", done:"draft prepared —"},
      {photo:"photo of a business card", get:"new contact, add to your base", done:"contact saved —"},
      {photo:"screenshot of an AIMA email", get:"residency appointment, needs a reply", done:"reply prepared —"}
    ],
    cta:"Connect Lis", share:"Share with a friend", ctaNote:"Set up once — then only results.",
    howTitle:"How it works", proofTitle:"Why it works",
    how:[

    proofs:[
      "As ações e a reflexão saem de ti — não uma lista de tarefas, mas decisões prontas.",
      "Corre sobre o Cowork e o Claude: máximo de acessos — mínimo de toques teus.",
      "Configuras uma vez — depois é teu. Não uma muleta, mas um secretário que corre sozinho."
    ]},
  es:{name:"Español", tag:"SeedWave · AI", sub:"Vive tu rutina por ti",
    hook:"Correo, calendario, banco, notas — Lis se conecta una vez y ordena el flujo solo. De ti: solo “Sí” o “No”. Y si quieres no olvidar algo — envía una foto, él hace el resto.",
    wowHead:"Lis en línea", exLbl:"Entendido:",
    ex:[
      {photo:"foto de una nota a mano", get:"factura al inquilino, vence mañana", done:"borrador preparado —"},

    ],
    cta:"Conectar Lis", share:"Enviar a un amigo", ctaNote:"Lo configuras una vez — después solo resultados.",
    howTitle:"Cómo funciona", proofTitle:"Por qué funciona",
    how:[
      "Conectas una vez: correo, calendario, banco, notas — y dices qué quitar de tu vista.",

  de:{name:"Deutsch", tag:"SeedWave · AI", sub:"Lebt deine Routine für dich",

    how:[

    proofs:[

    ]}
};
const ORDER=["pt","en","ru","es","de"];
const HUB="https://ikartuzov-hub.github.io/seedwave-catalog/hub/";
const qs=new URLSearchParams(location.search);
let lang=(qs.get("lang")||localStorage.getItem("sw_lang")||(navigator.language||"pt").slice(0,2)).toLowerCase();
if(!L[lang])lang="pt";
let theme=qs.get("theme")||localStorage.getItem("sw_theme")||"dark";

function applyTheme(){document.documentElement.dataset.theme=theme==="light"?"light":"";
  document.getElementById("themeBtn").textContent=theme==="light"?"☀":"☾";
  document.querySelector('meta[name=theme-color]').content=theme==="light"?"#FBF4EE":"#1B1410";}
function apply(){
  const t=L[lang];document.documentElement.lang=lang;
  document.querySelectorAll("[data-i]").forEach(el=>{const k=el.getAttribute("data-i");if(t[k]!=null)el.textContent=t[k];});
  document.getElementById("langBtn").textContent=lang.toUpperCase();
  document.getElementById("steps").innerHTML=t.how.map((s,i)=>`<div class="step"><span class="n">${i+1}</span><p>${s}</p></div>`).join("");
  document.getElementById("proofs").innerHTML=t.proofs.map(p=>`<li>${p}</li>`).join("");
  document.getElementById("ctaBtn").href="onboarding.html?lang="+lang+"&theme="+(theme==="light"?"light":"dark");
  document.getElementById("swLink").href=HUB+"?lang="+lang+"&theme="+(theme==="light"?"light":"dark");
  document.getElementById("yr").textContent=new Date().getFullYear();
  document.title="Lis — "+t.sub;
  runDemo(true);
}
// language menu
const menu=document.getElementById("langMenu");
menu.innerHTML=ORDER.map(c=>`<button data-l="${c}" ${c===lang?'aria-current="true"':''}><span class="code">${c.toUpperCase()}</span> ${L[c].name}</button>`).join("");
const langBtn=document.getElementById("langBtn");
langBtn.onclick=e=>{e.stopPropagation();const o=menu.classList.toggle("open");langBtn.setAttribute("aria-expanded",o);};
document.addEventListener("click",()=>menu.classList.remove("open"));
document.addEventListener("keydown",e=>{if(e.key==="Escape")menu.classList.remove("open");});
menu.querySelectorAll("button").forEach(b=>b.onclick=()=>{lang=b.dataset.l;localStorage.setItem("sw_lang",lang);
  menu.querySelectorAll("button").forEach(x=>x.removeAttribute("aria-current"));b.setAttribute("aria-current","true");
  menu.classList.remove("open");apply();});
document.getElementById("themeBtn").onclick=()=>{theme=theme==="light"?"dark":"light";localStorage.setItem("sw_theme",theme);applyTheme();apply();};

// photo-wow demo (cycles examples)
let demoTimer=null, exIdx=0;
const p1=document.getElementById("p1"),p2=document.getElementById("p2"),p3=document.getElementById("p3");
const reduce=window.matchMedia&&window.matchMedia("(prefers-reduced-motion:reduce)").matches;
function paintEx(i){
  const t=L[lang],e=t.ex[i];
  document.getElementById("exPhoto").textContent=e.photo;
  document.getElementById("exGet").textContent=e.get;
  document.getElementById("exDone").textContent="✓ "+e.done;
}
function runDemo(reset){
  clearTimeout(demoTimer);
  if(reset){exIdx=0;}
  if(reduce){paintEx(exIdx);[p1,p2,p3].forEach(p=>p.classList.add("show"));return;}
  [p1,p2,p3].forEach(p=>p.classList.remove("show"));
  paintEx(exIdx);
  setTimeout(()=>p1.classList.add("show"),120);
  setTimeout(()=>p2.classList.add("show"),900);
  setTimeout(()=>p3.classList.add("show"),1700);
  demoTimer=setTimeout(()=>{
    [p1,p2,p3].forEach(p=>p.classList.remove("show"));
    exIdx=(exIdx+1)%L[lang].ex.length;
    demoTimer=setTimeout(()=>runDemo(false),450);
  },4200);
}

// share
const toast=document.getElementById("toast");
document.getElementById("shareBtn").onclick=async()=>{
  const t=L[lang];const txt=t.sub+" — "+t.hook.split(".")[0]+".";
  const url="https://l.seedwave.dev/?lang="+lang;
  try{if(navigator.share){await navigator.share({title:"Lis",text:txt,url});return;}}catch(e){}
  try{await navigator.clipboard.writeText(txt+" "+url);toast.textContent="✓";toast.classList.add("show");setTimeout(()=>toast.classList.remove("show"),1600);}catch(e){}
};

applyTheme();apply();
</script>
